appId: app.getberean.berean
productName: Berean
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.*}'
  - '!berean-site/**'
asarUnpack:
  - resources/**
  - node_modules/better-sqlite3/**
win:
  executableName: berean
  target:
    - target: nsis
      arch:
        - x64
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  executableName: Berean
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  # For code signing, set CSC_LINK and CSC_KEY_PASSWORD env vars and remove the line below
  identity: null  # unsigned build — replace with Developer ID signing for production
dmg:
  artifactName: ${name}-${version}-${arch}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: dnav0     # your GitHub username — update if different
  repo: berean     # your repo name — update if different
  releaseType: release   # publish directly — skip draft state
